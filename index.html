<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسبحة نسب - مكتبة الغيث</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --card-bg: #ffffff;
            --accent-color: #2c3e50;
            --subhan-color: #27ae60;
            --akbar-color: #2980b9;
            --tahlil-color: #8e44ad;
            --text-main: #34495e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 400px;
        }

        .tasbih-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .counter-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
            color: var(--accent-color);
        }

        .dhikr-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.1s ease;
            color: white;
            font-weight: bold;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }

        .btn-subhan { background-color: var(--subhan-color); }
        .btn-akbar { background-color: var(--akbar-color); }
        .btn-tahlil { background-color: var(--tahlil-color); }
        
        .btn-reset {
            background-color: #e74c3c;
            margin-top: 10px;
            padding: 8px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .footer b { color: var(--accent-color); }

        /* تأثير الاهتزاز البسيط */
        @keyframes click-shake {
            0% { transform: translate(0, 0); }
            50% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }
        .click-effect { animation: click-shake 0.1s ease-in-out; }

    </style>
</head>
<body>

    <div class="header">
        <h1>مسبحة نسب تركي 📿</h1>
        <p>اذكر الله يذكرك</p>
    </div>

    <div class="container">
        <div class="tasbih-card" id="card-1">
            <span class="dhikr-title" style="color: var(--subhan-color);">سبحان الله</span>
            <div class="counter-display" id="count-subhan">0</div>
            <div class="btn-group">
                <button class="btn-subhan" onclick="increment('subhan')">تسبيح</button>
                <button class="btn-reset" onclick="resetCount('subhan')">تصفير</button>
            </div>
        </div>

        <div class="tasbih-card" id="card-2">
            <span class="dhikr-title" style="color: var(--akbar-color);">الله أكبر</span>
            <div class="counter-display" id="count-akbar">0</div>
            <div class="btn-group">
                <button class="btn-akbar" onclick="increment('akbar')">تكبير</button>
                <button class="btn-reset" onclick="resetCount('akbar')">تصفير</button>
            </div>
        </div>

        <div class="tasbih-card" id="card-3">
            <span class="dhikr-title" style="color: var(--tahlil-color);">لا إله إلا الله</span>
            <div class="counter-display" id="count-tahlil">0</div>
            <div class="btn-group">
                <button class="btn-tahlil" onclick="increment('tahlil')">تهليل</button>
                <button class="btn-reset" onclick="resetCount('tahlil')">تصفير</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>أن شاء الله</p>
        <p>عمل <b>مكتبة الغيث</b></p>
    </div>

    <script>
        function increment(type) {
            const element = document.getElementById('count-' + type);
            let current = parseInt(element.innerText);
            element.innerText = current + 1;

            // تكة خفيفة (اهتزاز للموبايل)
            if (navigator.vibrate) {
                navigator.vibrate(20);
            }

            // إضافة تأثير حركي للبطاقة
            const card = element.parentElement;
            card.classList.add('click-effect');
            setTimeout(() => card.classList.remove('click-effect'), 100);
        }

        function resetCount(type) {
            if(confirm('هل تريد تصفير العداد؟')) {
                document.getElementById('count-' + type).innerText = 0;
            }
        }
    </script>
</body>
</html>
